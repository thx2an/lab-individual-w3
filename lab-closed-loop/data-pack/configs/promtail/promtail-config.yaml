server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: audit_log
    static_configs:
      - targets:
          - localhost
        labels:
          job: closed_loop_audit
          __path__: /audit/audit_log.jsonl
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            level: level
            event_type: event_type
            service: service
      - labels:
          level:
          event_type:
          service:
      - timestamp:
          source: ts
          format: RFC3339Nano
          action_on_failure: skip
