global:
  scrape_interval: 10s
  evaluation_interval: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: "frontend"
    static_configs:
      - targets: ["frontend:8080"]
        labels:
          service: "frontend"

  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8080"]
        labels:
          service: "api-gateway"

  - job_name: "payment-svc"
    static_configs:
      - targets: ["payment-svc:8080"]
        labels:
          service: "payment-svc"

  - job_name: "inventory-svc"
    static_configs:
      - targets: ["inventory-svc:8080"]
        labels:
          service: "inventory-svc"

  - job_name: "checkout-svc"
    static_configs:
      - targets: ["checkout-svc:8080"]
        labels:
          service: "checkout-svc"

  - job_name: "closed-loop"
    # honor_labels: keep the orchestrator's own per-service labels (payment-svc, …)
    # on its exported gauges. Without this, the static `service` target label below
    # overrides them, collapsing every per-service series to closed-loop-orchestrator
    # (and renaming the real one to exported_service) — which breaks the
    # blast-radius / mutex panels that group by `service`.
    honor_labels: true
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          service: "closed-loop-orchestrator"
